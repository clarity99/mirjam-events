<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5Rhythms Dance Events - Upcoming Workshops</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInDown 1s ease-out;
        }

        .subtitle {
            font-size: 1.3em;
            opacity: 0.95;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
            margin: 50px 0;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .event-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 0.8s ease-out;
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .event-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .event-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        .event-date {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            position: relative;
        }

        .event-title {
            font-size: 1.5em;
            margin-bottom: 5px;
            position: relative;
        }

        .event-teacher {
            font-size: 1.1em;
            opacity: 0.9;
            position: relative;
        }

        .event-body {
            padding: 30px;
        }

        .event-location {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            color: #667eea;
            font-size: 1.1em;
            font-weight: 600;
        }

        .event-location::before {
            content: '📍';
            margin-right: 10px;
            font-size: 1.3em;
        }

        .event-description {
            line-height: 1.6;
            margin-bottom: 20px;
            color: #555;
        }

        .event-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .month-section {
            margin-bottom: 50px;
        }

        .month-header {
            color: white;
            font-size: 2em;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid white;
            animation: slideInLeft 0.8s ease-out;
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px;
            font-size: 1.1em;
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }

            .event-date {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎶 5Rhythms Dance Events 💃</h1>
            <p class="subtitle">Upcoming Workshops & Retreats | Spring - Summer 2026</p>
        </header>

        <div id="events-container">
            <div class="loading">Loading events...</div>
        </div>

        <footer>
            <p>✨ The 5Rhythms practice: Flowing, Staccato, Chaos, Lyrical, Stillness ✨</p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                "We dance to shed skins, find peace, be nobody and somebody at the same time." - Gabrielle Roth
            </p>
        </footer>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Initialize Supabase client
        const SUPABASE_URL = 'https://uuiciraccldtencjcjlu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1aWNpcmFjY2xkdGVuY2pjamx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAwNDc1ODMsImV4cCI6MjA1NTYyMzU4M30.sb_publishable_9UpO-G8BjIe1QwBETesHHg_2V0JARrG';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fetch and display events
        async function loadEvents() {
            try {
                // Fetch events from Supabase, ordered by date
                const { data: events, error } = await supabase
                    .from('events')
                    .select('*')
                    .gte('date_start', new Date().toISOString().split('T')[0]) // Only future events
                    .order('month_order', { ascending: true })
                    .order('date_start', { ascending: true });

                if (error) {
                    console.error('Error fetching events:', error);
                    document.getElementById('events-container').innerHTML =
                        '<div class="loading" style="color: #ff6b6b;">Error loading events. Please try again later.</div>';
                    return;
                }

                // Group events by month
                const eventsByMonth = {};
                events.forEach(event => {
                    if (!eventsByMonth[event.month_name]) {
                        eventsByMonth[event.month_name] = [];
                    }
                    eventsByMonth[event.month_name].push(event);
                });

                // Render events
                const container = document.getElementById('events-container');
                container.innerHTML = '';

                Object.keys(eventsByMonth).forEach(monthName => {
                    const monthSection = document.createElement('div');
                    monthSection.className = 'month-section';

                    const monthHeader = document.createElement('h2');
                    monthHeader.className = 'month-header';
                    monthHeader.textContent = monthName;
                    monthSection.appendChild(monthHeader);

                    const eventsGrid = document.createElement('div');
                    eventsGrid.className = 'events-grid';

                    eventsByMonth[monthName].forEach(event => {
                        const card = createEventCard(event);
                        eventsGrid.appendChild(card);
                    });

                    monthSection.appendChild(eventsGrid);
                    container.appendChild(monthSection);
                });

                if (events.length === 0) {
                    container.innerHTML = '<div class="loading">No upcoming events at this time.</div>';
                }

            } catch (err) {
                console.error('Unexpected error:', err);
                document.getElementById('events-container').innerHTML =
                    '<div class="loading" style="color: #ff6b6b;">Error loading events. Please try again later.</div>';
            }
        }

        // Create event card HTML
        function createEventCard(event) {
            const card = document.createElement('div');
            card.className = 'event-card';

            const header = document.createElement('div');
            header.className = 'event-header';
            header.innerHTML = `
                <div class="event-date">${event.date_display}</div>
                <div class="event-title">${event.title}</div>
                <div class="event-teacher">${event.teacher}</div>
            `;

            const body = document.createElement('div');
            body.className = 'event-body';

            const location = document.createElement('div');
            location.className = 'event-location';
            location.textContent = event.location;

            const description = document.createElement('div');
            description.className = 'event-description';
            description.textContent = event.description;

            const tags = document.createElement('div');
            tags.className = 'event-tags';
            if (event.tags && event.tags.length > 0) {
                event.tags.forEach(tagText => {
                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.textContent = tagText;
                    tags.appendChild(tag);
                });
            }

            body.appendChild(location);
            body.appendChild(description);
            body.appendChild(tags);

            card.appendChild(header);
            card.appendChild(body);

            return card;
        }

        // Load events when page loads
        window.addEventListener('DOMContentLoaded', loadEvents);
    </script>
</body>
</html>
